<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizli AI</title>
    <meta name="theme-color" content="#1A1A2E">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            background: #1A1A2E;
            color: #E2E8F0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            background: #000;
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #A855F7 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #94A3B8;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: #2D3748;
            border: 1px solid #4A5568;
            border-radius: 12px;
            color: #E2E8F0;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .login-btn:hover {
            background: #374151;
            border-color: #6B7280;
        }
        
        .login-btn img, .login-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #64748B;
            font-size: 14px;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #334155;
        }
        
        .divider span {
            padding: 0 12px;
        }
        
        .credit-footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #64748B;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="icon-192.png" alt="Bizli AI">
        </div>
        <h1>Bizli AI</h1>
        <p class="subtitle">Your personal AI assistant</p>
        
        <button class="login-btn" onclick="signInWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Continue with Google
        </button>
        
        <button class="login-btn" onclick="signInWithEmail()">
            <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            Continue with Email
        </button>
        
        <div class="divider"><span>or</span></div>
        
        <button class="login-btn" onclick="signInWithApple()">
            <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
            </svg>
            Continue with Apple
        </button>
    </div>
    
    <div class="credit-footer">Developed by Abhya</div>
    
    <script>
        function signInWithGoogle() {
            console.log('Google sign in');
            // Your Firebase auth code here
        }
        function signInWithEmail() {
            console.log('Email sign in');
            // Redirect to email/password form
        }
        function signInWithApple() {
            console.log('Apple sign in');
            // Your Apple auth code here
        }
    </script>
</body>
</html>
