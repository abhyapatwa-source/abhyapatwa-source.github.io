<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizli AI - Login</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; display: flex; align-items: center; justify-content: center; color: #fff;
    }
   .login-box {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      padding: 40px; border-radius: 20px; text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 400px; width: 90%;
    }
    h1 { font-size: 2.5rem; margin-bottom: 10px; }
    p { opacity: 0.9; margin-bottom: 30px; }
    #g_id_signin { display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Bizli AI 🩵</h1>
    <p>Your 10-year-old AI daughter</p>
    <div id="g_id_onload"
      data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
      data-context="signin"
      data-ux_mode="popup"
      data-callback="handleCredentialResponse"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-theme="filled_blue" data-text="continue_with" data-shape="pill"></div>
  </div>

  <script>
    function handleCredentialResponse(response) {
      // Save token and redirect to app
      localStorage.setItem('bizli_token', response.credential);
      window.location.href = '/app.html';
    }
  </script>
</body>
</html>
