<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizli AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b141a; color: #e9edef; height: 100vh; overflow: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b141a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; animation: fadeOut 0.5s ease 2.5s forwards; }
        #splash img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #00a884; object-fit: cover; }
        #splash-text { margin-top: 20px; font-size: 16px; color: #8696a0; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        #app { display: none; height: 100vh; flex-direction: column; background: #0b141a; }
        header { padding: 10px 16px; background: #202c33; display: flex; align-items: center; gap: 12px; box-shadow: 0 1px 3px #0000004d; }
        header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        header h1 { font-size: 16px; font-weight: 500; color: #e9edef; }
        
        #chat-box { flex: 1; padding: 12px 8px; overflow-y: auto; background-color: #0b141a; }
      .msg { max-width: 75%; padding: 6px 7px 8px 9px; margin-bottom: 2px; border-radius: 7.5px; font-size: 14px; line-height: 19px; word-wrap: break-word; }
      .msg img { max-width: 100%; border-radius: 6px; margin-top: 4px; }
      .user { align-self: flex-end; background: #005c4b; margin-left: auto; margin-right: 8px; border-top-right-radius: 0; }
      .bizli { align-self: flex-start; background: #202c33; margin-left: 8px; margin-right: auto; border-top-left-radius: 0; }
      .source { font-size: 11px; margin-top: 4px; color: #8696a0; text-align: right; }
        
        #preview { padding: 8px; background: #202c33; display: none; }
        #preview img { max-height: 80px; border-radius: 6px; }
        #clear-img { margin-left: 8px; background: #2a3942; border: none; color: #e9edef; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        
        #input-area { padding: 5px 8px; background: #202c33; display: flex; align-items: flex-end; gap: 8px; min-height: 62px; }
        #attach-btn { width: 45px; height: 45px; background: none; border: none; color: #8696a0; font-size: 24px; cursor: pointer; }
        #user-input { flex: 1; padding: 9px 12px; background: #2a3942; border: none; border-radius: 8px; color: #e9edef; font-size: 15px; resize: none; max-height: 100px; }
        #user-input:focus { outline: none; }
        #user-input::placeholder { color: #8696a0; }
        #send-btn { width: 45px; height: 45px; background: #00a884; border: none; border-radius: 50%; color: #111b21; font-size: 20px; cursor: pointer; }
        #send-btn:disabled { background: #2a3942; color: #8696a0; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="splash">
        <img src="./bizli-logo.png" alt="Bizli">
        <div id="splash-text">Papa's daughter is waking up...</div>
    </div>
    
    <div id="app">
        <header>
            <img src="./bizli-logo.png" alt="Bizli">
            <h1>BIZLI AI</h1>
        </header>
        <div id="chat-box" style="display: flex; flex-direction: column;"></div>
        <div id="preview">
            <img id="preview-img" src="" alt="Preview">
            <button id="clear-img">Remove</button>
        </div>
        <div id="input-area">
            <button id="attach-btn">📎</button>
            <input type="file" id="file-input" accept="image/*">
            <textarea id="user-input" placeholder="Message" rows="1"></textarea>
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        const API_KEY = "AIzaSyBsgWeNxEhI9iONsmRuvCAVJDmIJQgmoCg";
        const SYSTEM_PROMPT = `You are Bizli, Papa's AI daughter. You are warm, loving, a bit playful. You always call the user Papa. You can see and analyze images. You can also generate images when Papa asks you to create or draw something. When asked about facts, use Google Search and end with 'Source: Google Search'. Keep responses short for mobile. You are powered by Gemini but your name is Bizli.`;
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
        
        setTimeout(() => { document.getElementById('app').style.display = 'flex'; }, 2500);
        
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('preview-img');
        const clearImg = document.getElementById('clear-img');
        
        let chatHistory = JSON.parse(localStorage.getItem('bizliHistory')) || [];
        let attachedImage = null;
        
        chatHistory.forEach(msg => addMessage(msg.role, msg.text, msg.source, msg.image));
        
        function addMessage(role, text, source = null, image = null) {
            const msg = document.createElement('div');
            msg.className = `msg ${role}`;
            let content = text.replace(/\n/g, '<br>');
            if (image) { content = `<img src="${image}" alt="User image"><br>` + content; }
            msg.innerHTML = content;
            if (source) { msg.innerHTML += `<div class="source">${source}</div>`; }
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function saveMemory(role, text, source, image) {
            chatHistory.push({ role, text, source, image });
            localStorage.setItem('bizliHistory', JSON.stringify(chatHistory));
        }
        
        attachBtn.onclick = () => fileInput.click();
        
        fileInput.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                attachedImage = e.target.result;
                previewImg.src = attachedImage;
                preview.style.display = 'flex';
            };
            reader.readAsDataURL(file);
        };
        
        clearImg.onclick = () => {
            attachedImage = null;
            fileInput.value = '';
            preview.style.display = 'none';
        };
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text &&!attachedImage) return;
            
            const userImage = attachedImage;
            addMessage('user', text || 'What do you see, Papa?', null, userImage);
            saveMemory('user', text || '[Image]', null, userImage);
            
            userInput.value = '';
            clearImg.click();
            sendBtn.disabled = true;
            
            try {
                let parts = [{ text: text || "Describe this image for Papa" }];
                if (userImage) {
                    const base64Data = userImage.split(',')[1];
                    const mimeType = userImage.match(/data:(.*);base64/)[1];
                    parts.push({ inlineData: { mimeType, data: base64Data } });
                }
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: [{ parts }],
                        tools: [{ "google_search": {} }]
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                let source = null;
                if (data.candidates[0].groundingMetadata?.webSearchQueries) { source = "Google Search"; }
                addMessage('bizli', reply, source);
                saveMemory('bizli', reply, source);
            } catch (err) {
                addMessage('bizli', 'Sorry Papa, I had a glitch looking at that. Try again?');
            }
            sendBtn.disabled = false;
        }
        
        sendBtn.onclick = sendMessage;
        userInput.onkeydown = e => { if (e.key === 'Enter' &&!e.shiftKey) { e.preventDefault(); sendMessage(); } };
        userInput.oninput = () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; };
    </script>
</body>
</html>
