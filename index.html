<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizli AI</title>
    <meta name="theme-color" content="#1A1A2E">
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            background: #1A1A2E;
            color: #E2E8F0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #A855F7 0%, #8B5CF6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #94A3B8;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        .google-btn {
            width: 100%;
            padding: 14px 24px;
            background: #2D3748;
            border: 1px solid #4A5568;
            border-radius: 12px;
            color: #E2E8F0;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .google-btn:hover {
            background: #374151;
            border-color: #6B7280;
        }
        
        .google-btn img {
            width: 20px;
            height: 20px;
        }
        
        .credit-footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: #64748B;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/icon-192.png" alt="Bizli AI">
        </div>
        <h1>Bizli AI</h1>
        <p class="subtitle">Your personal AI assistant</p>
        
        <button class="google-btn" onclick="signInWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Continue with Google
        </button>
    </div>
    
    <div class="credit-footer">Developed by Abhya</div>
    
    <script>
        function signInWithGoogle() {
            // Your Firebase auth code here
            console.log('Google sign in');
        }
    </script>
</body>
</html>
