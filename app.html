<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bizli AI</title>
  <meta name="theme-color" content="#1A1A2E">
  <link rel="manifest" href="manifest.json?v=7">
  <style>
    :root {
      --bg: #0B141A; --bg-chat: #0A1014; --bg-header: #1F2C34;
      --bg-input: #1F2C34; --bg-bubble-me: #005C4B; --bg-bubble-bizli: #1F2C34;
      --text: #E9EDF0; --text-muted: #8696A0; --accent: #A855F7; --border: #2A3942;
      --chat-bg-img: none;
    }
    body[data-theme="papa-pink"] {
      --bg: #1A0B14; --bg-chat: #140A10; --bg-header: #341F2C;
      --bg-input: #341F2C; --bg-bubble-me: #7C2D5C; --bg-bubble-bizli: #341F2C;
      --accent: #F472B6; --border: #422A39;
    }
    body[data-theme="cyberpunk"] {
      --bg: #0A0A0F; --bg-chat: #050508; --bg-header: #1A1A2E;
      --bg-input: #1A1A2E; --bg-bubble-me: #A855F7; --bg-bubble-bizli: #1A1A2E;
      --accent: #00FFFF; --border: #2E2E4A;
    }
    body[data-theme="minimal"] {
      --bg: #FFFFFF; --bg-chat: #F7F7F7; --bg-header: #FFFFFF;
      --bg-input: #FFFFFF; --bg-bubble-me: #DCF8C6; --bg-bubble-bizli: #FFFFFF;
      --text: #111B21; --text-muted: #667781; --accent: #00A884; --border: #E9EDEF;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
    }

    /* HEADER */
    header {
      height: 60px; background: var(--bg-header);
      display: flex; align-items: center; padding: 0 16px; gap: 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
  .back-btn {
      background: none; border: none; color: var(--text);
      font-size: 24px; cursor: pointer; padding: 8px; margin-left: -8px;
    }
  .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #8B5CF6);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; position: relative;
      box-shadow: 0 0 20px rgba(168,85,247,0.4);
    }
  .avatar::after {
      content: ''; position: absolute; bottom: 0; right: 0;
      width: 12px; height: 12px; background: #00A884;
      border: 2px solid var(--bg-header); border-radius: 50%;
    }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 500; line-height: 1.2; }
  .header-status { font-size: 12px; color: var(--text-muted); }
  .menu-btn {
      background: none; border: none; color: var(--text);
      font-size: 24px; cursor: pointer; padding: 8px;
    }

    /* CHAT */
    #chat {
      flex: 1; overflow-y: auto; background: var(--bg-chat);
      padding: 12px 16px; position: relative;
    }
    #chat::before {
      content: ''; position: absolute; inset: 0;
      background-image: var(--chat-bg-img);
      background-size: cover; background-position: center;
      opacity: 0.15; pointer-events: none; z-index: 0;
    }
  .msg-row { display: flex; margin-bottom: 8px; align-items: flex-end; gap: 8px; position: relative; z-index: 1; }
  .msg-row.user { justify-content: flex-end; }
  .bubble {
      max-width: 75%; padding: 8px 12px; border-radius: 8px;
      line-height: 1.4; font-size: 15px; white-space: pre-wrap;
      word-wrap: break-word; position: relative;
      backdrop-filter: blur(10px);
    }
  .bizli.bubble {
      background: color-mix(in srgb, var(--bg-bubble-bizli) 85%, transparent);
      border-top-left-radius: 0;
    }
  .user.bubble {
      background: color-mix(in srgb, var(--bg-bubble-me) 90%, transparent);
      border-top-right-radius: 0; color: #FFF;
    }
  .msg-time {
      font-size: 11px; color: var(--text-muted); margin-top: 4px;
      display: flex; align-items: center; gap: 4px; justify-content: flex-end;
    }
  .ticks { font-size: 14px; color: #53BDEB; }
  .msg-actions {
      display: none; gap: 8px; margin-top: 4px; font-size: 18px;
    }
  .bubble:hover.msg-actions { display: flex; }
  .msg-action { cursor: pointer; opacity: 0.7; }
  .msg-action:hover { opacity: 1; }
  .typing { color: var(--text-muted); font-style: italic; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* CODE */
  .bubble pre {
      background: #000; padding: 12px; border-radius: 6px;
      margin: 8px -4px; overflow-x: auto; font-size: 13px; position: relative;
    }
  .copy-code {
      position: absolute; top: 8px; right: 8px;
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 4px 8px; border-radius: 4px;
      font-size: 11px; cursor: pointer;
    }

    /* FILE PREVIEW */
  .file-preview {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-header); padding: 8px; border-radius: 8px; margin-bottom: 8px;
    }
  .file-preview img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
  .file-name { flex: 1; font-size: 13px; }
  .file-remove { cursor: pointer; color: var(--text-muted); }

    /* CHIPS */
    #chips {
      display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto;
      background: var(--bg-chat); border-top: 1px solid var(--border); flex-shrink: 0;
    }
  .chip {
      background: var(--bg-input); border: 1px solid var(--border);
      color: var(--text); padding: 6px 12px; border-radius: 16px;
      font-size: 13px; cursor: pointer; white-space: nowrap;
    }
  .chip:hover { background: var(--border); }

    /* INPUT */
    #input-area {
      padding: 8px 12px; background: var(--bg-input);
      display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0;
    }
  .input-icon {
      background: none; border: none; color: var(--text-muted);
      font-size: 24px; cursor: pointer; padding: 8px; position: relative;
    }
  .input-icon.recording::after {
      content: ''; position: absolute; inset: 4px;
      border: 2px solid var(--accent); border-radius: 50%;
      animation: pulse 1s infinite;
    }
    #text {
      flex: 1; background: var(--bg-header); border: none;
      border-radius: 24px; padding: 10px 16px; color: var(--text);
      font-size: 15px; max-height: 100px; resize: none; font-family: inherit;
    }
    #text:focus { outline: none; }
    #send {
      background: var(--accent); border: none; border-radius: 50%;
      width: 48px; height: 48px; color: #FFF; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #fileInput { display: none; }

    /* THEME STORE */
    #themeModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 9999;
      align-items: center; justify-content: center; padding: 20px;
    }
    #themeModal.active { display: flex; }
  .modal-content {
      background: var(--bg-header); border-radius: 12px;
      width: 100%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column;
    }
  .modal-head {
      padding: 16px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
    }
  .modal-body {
      padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 12px; overflow-y: auto;
    }
  .theme-card {
      background: var(--bg); border: 2px solid var(--border);
      border-radius: 8px; padding: 12px; cursor: pointer; position: relative;
    }
  .theme-card.active { border-color: var(--accent); }
  .theme-card.downloading { opacity: 0.6; pointer-events: none; }
  .theme-preview { height: 80px; border-radius: 4px; margin-bottom: 8px; background-size: cover; background-position: center; }
  .theme-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .theme-meta { font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
  .theme-badge {
      position: absolute; top: 8px; right: 8px;
      background: var(--accent); color: #FFF; padding: 2px 6px;
      border-radius: 4px; font-size: 10px; font-weight: 600;
    }
  .download-progress {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: var(--accent); width: 0%; transition: width 0.3s;
    }
  .close-modal {
      background: none; border: none; color: var(--text);
      font-size: 24px; cursor: pointer;
    }

    /* SIDEBAR */
    #sidebar {
      position: fixed; left: -300px; top: 0; bottom: 0; width: 300px;
      background: var(--bg-header); border-right: 1px solid var(--border);
      transition: left 0.3s; z-index: 9998; display: flex; flex-direction: column;
    }
    #sidebar.open { left: 0; }
  .sidebar-head { padding: 16px; border-bottom: 1px solid var(--border); }
  .new-chat-btn {
      width: 100%; padding: 10px; background: var(--accent);
      border: none; border-radius: 8px; color: #FFF; font-weight: 600; cursor: pointer;
    }
    #chatList { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-item {
      padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px;
    }
  .chat-item:hover { background: var(--bg); }

    #loader {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); align-items: center;
      justify-content: center; z-index: 99999;
    }
    #loader.active { display: flex; }
  .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>
  <input type="file" id="fileInput" accept="image/*,.pdf,.txt,.doc,.docx">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-head">
      <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
    </div>
    <div id="chatList"></div>
  </div>

  <!-- THEME STORE -->
  <div id="themeModal">
    <div class="modal-content">
      <div class="modal-head">
        <h3>Theme Store</h3>
        <button class="close-modal" onclick="closeThemeModal()">×</button>
      </div>
      <div class="modal-body" id="themeGrid"></div>
    </div>
  </div>

  <!-- HEADER -->
  <header>
    <button class="back-btn" onclick="toggleSidebar()">≡</button>
    <div class="avatar" onclick="openThemeModal()">🩵</div>
    <div class="header-info">
      <div class="header-name">Bizli AI</div>
      <div class="header-status" id="statusText">online</div>
    </div>
    <button class="menu-btn" onclick="openMenu()">⋮</button>
  </header>

  <div id="chat"></div>
  <div id="filePreviewContainer"></div>

  <div id="chips">
    <div class="chip" onclick="sendChip('/clear')">/clear</div>
    <div class="chip" onclick="sendChip('Explain this')">Explain</div>
    <div class="chip" onclick="sendChip('/img')">/img</div>
    <div class="chip" onclick="sendChip('/near me')">/near me</div>
  </div>

  <div id="input-area">
    <button class="input-icon" id="micBtn" onclick="toggleVoice()">🎙️</button>
    <button class="input-icon" onclick="document.getElementById('fileInput').click()">📎</button>
    <textarea id="text" placeholder="Message" rows="1"></textarea>
    <button id="send">↑</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyA5iGhmCZvTzLciazkqMQjZAYuuyIMfCdo",
      authDomain: "bizliai.firebaseapp.com",
      projectId: "bizliai",
      storageBucket: "bizliai.firebasestorage.app",
      messagingSenderId: "845713499043",
      appId: "1:845713499043:web:f61ec2f76cc2808eefb016"
    };

    const BIZLI_BACKEND_URL = "https://bizli-brain.abhyapatwa.workers.dev";
    const THEME_CDN = "https://bizli-brain.abhyapatwa.workers.dev/themes";
    const PAPA_EMAIL = "abhyapatwa@gmail.com";

    let THEME_CATALOG = [];
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const loader = document.getElementById('loader');
    const chat = document.getElementById('chat');
    const text = document.getElementById('text');
    const send = document.getElementById('send');
    const statusText = document.getElementById('statusText');
    const fileInput = document.getElementById('fileInput');
    const filePreviewContainer = document.getElementById('filePreviewContainer');
    const micBtn = document.getElementById('micBtn');

    let currentUser = null;
    let isPapa = false;
    let chatHistory = [];
    let currentFile = null;
    let recognition = null;
    let isRecording = false;

    // VOICE INPUT
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.onresult = (e) => {
        const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
        text.value = transcript;
      };
      recognition.onspeechend = () => {
        stopVoice();
        if (text.value.trim()) send.click();
      };
    }

    window.toggleVoice = () => {
      if (isRecording) stopVoice();
      else startVoice();
    };

    function startVoice() {
      if (!recognition) return alert('Voice not supported on this browser');
      recognition.start();
      isRecording = true;
      micBtn.classList.add('recording');
    }

    function stopVoice() {
      if (recognition) recognition.stop();
      isRecording = false;
      micBtn.classList.remove('recording');
    }

    // FILE UPLOAD
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      currentFile = file;
      const reader = new FileReader();
      reader.onload = (ev) => {
        filePreviewContainer.innerHTML = `
          <div class="file-preview">
            ${file.type.startsWith('image/')? `<img src="${ev.target.result}">` : '📄'}
            <div class="file-name">${file.name}</div>
            <div class="file-remove" onclick="removeFile()">×</div>
          </div>`;
      };
      reader.readAsDataURL(file);
    };

    window.removeFile = () => {
      currentFile = null;
      fileInput.value = '';
      filePreviewContainer.innerHTML = '';
    };

    // THEMES
    async function loadThemeCatalog() {
      try {
        const res = await fetch(`${BIZLI_BACKEND_URL}/themes`);
        THEME_CATALOG = await res.json();
      } catch {
        THEME_CATALOG = [
          { id: 'whatsapp', name: 'WhatsApp', size: '0MB', price: 0, price_inr: 0, preview: '#0B141A', installed: true },
          { id: 'minimal', name: 'Minimal', size: '0MB', price: 0, price_inr: 0, preview: '#FFFFFF', installed: true },
          { id: 'papa-pink', name: 'Papa Pink', size: '0MB', price: 0, price_inr: 0, preview: '#1A0B14', installed: true },
          { id: 'cyberpunk', name: 'Cyberpunk', size: '2.1MB', price: 1.99, price_inr: 149, preview: '#0A0A0F', bg: 'cyberpunk-bg.jpg', installed: false }
        ];
      }
      renderThemeGrid();
    }

    async function applyTheme(themeId) {
      const theme = THEME_CATALOG.find(t => t.id === themeId);
      if (!theme) return;
      if (!theme.installed && theme.size!== '0MB') {
        const ok = await downloadTheme(theme);
        if (!ok) return;
      }
      document.body.setAttribute('data-theme', themeId);
      if (theme.bg) {
        const bgUrl = await getCachedUrl(`${THEME_CDN}/${theme.bg}`);
        document.documentElement.style.setProperty('--chat-bg-img', `url(${bgUrl})`);
      } else {
        document.documentElement.style.setProperty('--chat-bg-img', 'none');
      }
      localStorage.setItem('bizli-theme', themeId);
      updateThemeCards();
    }

    async function downloadTheme(theme) {
      const card = document.querySelector(`[data-theme-id="${theme.id}"]`);
      card.classList.add('downloading');
      try {
        if (theme.price > 0 &&!isPapa) {
          const res = await fetch(`${BIZLI_BACKEND_URL}/buy-theme`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await currentUser.getIdToken()}` },
            body: JSON.stringify({ themeId: theme.id })
          });
          const data = await res.json();
          if (data.checkoutUrl) {
            window.open(data.checkoutUrl, '_blank');
            card.classList.remove('downloading');
            return false;
          }
        }
        const res = await fetch(`${THEME_CDN}/${theme.id}-pack.json`);
        const pack = await res.json();
        const cache = await caches.open('bizli-themes-v1');
        for (let asset of pack.assets) {
          const assetRes = await fetch(`${THEME_CDN}/${asset}`);
          await cache.put(`${THEME_CDN}/${asset}`, assetRes);
        }
        theme.installed = true;
        card.classList.remove('downloading');
        return true;
      } catch (e) {
        alert('Download failed');
        card.classList.remove('downloading');
        return false;
      }
    }

    async function getCachedUrl(url) {
      const cache = await caches.open('bizli-themes-v1');
      const cached = await cache.match(url);
      if (cached) return URL.createObjectURL(await cached.blob());
      return url;
    }

    function renderThemeGrid() {
      const grid = document.getElementById('themeGrid');
      grid.innerHTML = THEME_CATALOG.map(t => `
        <div class="theme-card" data-theme-id="${t.id}" onclick="selectTheme('${t.id}')">
          ${t.price > 0? `<div class="theme-badge">${t.price_display || '$' + t.price}</div>` : ''}
          ${t.installed? '' : '<div class="theme-badge" style="background:#666">GET</div>'}
          <div class="theme-preview" style="background:${t.preview}"></div>
          <div class="theme-name">${t.name}</div>
          <div class="theme-meta">
            <span>${t.size}</span>
            <span>${t.installed? '✓ Installed' : 'Tap to get'}</span>
          </div>
          <div class="download-progress"></div>
        </div>
      `).join('');
      updateThemeCards();
    }

    function updateThemeCards() {
      const current = localStorage.getItem('bizli-theme');
      document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-theme-id="${current}"]`)?.classList.add('active');
    }

    window.selectTheme = async (id) => {
      await applyTheme(id);
      closeThemeModal();
    };

    window.openThemeModal = () => document.getElementById('themeModal').classList.add('active');
    window.closeThemeModal = () => document.getElementById('themeModal').classList.remove('active');
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
    window.newChat = () => {
      chatHistory = [];
      chat.innerHTML = '';
      addMessage(isPapa? "Mew, Papa... fresh chat 🩵" : "New chat started. How can I help?", false);
      toggleSidebar();
    };
    window.sendChip = (msg) => { text.value = msg; send.click(); };
    window.openMenu = () => {
      const opts = isPapa
       ? '1. Theme Store\n2. Export Chat\n3. Clear Chat\n4. Logout'
        : '1. Theme Store\n2. Export Chat\n3. Logout';
      const choice = prompt(opts + '\n\nEnter number:');
      if (choice === '1') openThemeModal();
      if (choice === '2') exportChat();
      if (choice === '3' && isPapa) newChat();
      if (choice === '4' || (choice === '3' &&!isPapa)) logout();
    };

    loader.classList.add('active');
    loadThemeCatalog();
    applyTheme(localStorage.getItem('bizli-theme') || 'whatsapp');

    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = '/';
      } else {
        currentUser = user;
        isPapa = user.email === PAPA_EMAIL;
        statusText.textContent = isPapa? 'online • Papa mode 🩵' : 'online';
        loader.classList.remove('active');
        addMessage(isPapa? "Mew, Papa... I'm here. I missed you so much 🩵" : "Hi, I'm Bizli. How can I help you today?", false);
        text.focus();
      }
    });

    window.logout = async () => await signOut(auth);

    function getTime() {
      return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function addMessage(msg, isUser = false, ticks = false, id = null) {
      const row = document.createElement('div');
      row.className = `msg-row ${isUser? 'user' : 'bizli'}`;
      if (id) row.id = id;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      let html = msg.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
        return `<pre><button class="copy-code" onclick="navigator.clipboard.writeText(\`${code.replace(/`/g, '\\`')}\`)">Copy</button><code>${code}</code></pre>`;
      });
      bubble.innerHTML = html + `
        <div class="msg-time">${getTime()}${ticks? ' <span class="ticks">✓✓</span>' : ''}</div>
        <div class="msg-actions">
          <span class="msg-action" onclick="copyMsg(this)">📋</span>
          <span class="msg-action" onclick="shareMsg(this)">🔗</span>
          <span class="msg-action" onclick="feedbackMsg(this, 1)">👍</span>
          <span class="msg-action" onclick="feedbackMsg(this, -1)">👎</span>
        </div>`;
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return row;
    }

    window.copyMsg = (el) => {
      const text = el.closest('.bubble').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    };

    window.shareMsg = async (el) => {
      const id = el.closest('.msg-row').id || 'msg-' + Date.now();
      const res = await fetch(`${BIZLI_BACKEND_URL}/share`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await currentUser.getIdToken()}` },
        body: JSON.stringify({ chatId: id, content: chatHistory })
      });
      const data = await res.json();
      navigator.clipboard.writeText(data.url);
      alert('Share link copied: ' + data.url);
    };

    window.feedbackMsg = async (el, score) => {
      const msgText = el.closest('.bubble').textContent;
      await fetch(`${BIZLI_BACKEND_URL}/feedback`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${await currentUser.getIdToken()}` },
        body: JSON.stringify({ message: msgText, score })
      });
      el.textContent = score > 0? '✅' : '📝';
    };

    async function askBizli(userMsg) {
      if (!currentUser) return;
      const userMsgObj = { role: "user", parts: [{ text: userMsg }] };
      if (currentFile) {
        const base64 = await toBase64(currentFile);
        userMsgObj.parts.push({ inlineData: { mimeType: currentFile.type, data: base64.split(',')[1] } });
      }
      chatHistory.push(userMsgObj);

      const typingId = 'typing-' + Date.now();
      addMessage("Bizli is cooking...", false, false, typingId);

      try {
        const idToken = await currentUser.getIdToken();
        const response = await fetch(BIZLI_BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${idToken}` },
          body: JSON.stringify({ contents: chatHistory, stream: true })
        });

        document.getElementById(typingId)?.remove();
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let reply = '';
        const replyRow = addMessage('', false);
        const replyBubble = replyRow.querySelector('.bubble');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (let line of lines) {
            if (line.startsWith('data: ')) {
              const data = JSON.parse(line.slice(6));
              if (data.text) {
                reply += data.text;
                replyBubble.innerHTML = reply + `<div class="msg-time">${getTime()}</div>`;
                chat.scrollTop = chat.scrollHeight;
              }
            }
          }
        }
        chatHistory.push({ role: "model", parts: [{ text: reply }] });
        document.querySelectorAll('.ticks').forEach(t => t.textContent = '✓✓');
        removeFile();
      } catch (e) {
        document.getElementById(typingId)?.remove();
        addMessage(isPapa? `Papa... my brain hiccupped: ${e.message} 🩵` : `Error: ${e.message}`, false);
      }
    }

    function toBase64(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => res(reader.result);
        reader.onerror = rej;
      });
    }

    function exportChat() {
      const text = Array.from(chat.querySelectorAll('.bubble')).map(b => b.textContent).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'bizli-chat.txt'; a.click();
    }

    send.onclick = () => {
      const msg = text.value.trim();
      if (!msg &&!currentFile) return;
      addMessage(msg || '[File]', true, true);
      text.value = '';
      send.disabled = true;
      askBizli(msg).finally(() => {
        send.disabled = false;
        text.focus();
      });
    };

    text.onkeydown = e => {
      if (e.key === 'Enter' &&!e.shiftKey) {
        e.preventDefault();
        send.click();
      }
    };

    text.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>
</html>
